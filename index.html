<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>起始页</title>
    <!-- 允许加载任何图片源，避免浏览器安全策略误拦 -->
    <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:;">
    <style>
        :root {
            --bg-fallback: #1a1a2e;
            --icon-opacity-rest: 0.28;
            --icon-opacity-hover: 1;
            --transition-speed: 0.35s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-fallback);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.6s ease;
            cursor: default;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image: none;
        }

        /* 设置图标 */
        .settings-icon {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            opacity: var(--icon-opacity-rest);
            visibility: visible;
            background: rgba(28, 28, 30, 0.35);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity var(--transition-speed) ease,
                background var(--transition-speed) ease,
                transform var(--transition-speed) ease,
                border-color var(--transition-speed) ease,
                box-shadow var(--transition-speed) ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        .settings-icon:hover,
        .settings-icon.is-visible {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.6);
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            transform: rotate(30deg);
        }

        .settings-icon:active {
            transform: rotate(30deg) scale(0.92);
            transition: transform 0.12s ease;
        }

        .settings-icon.is-panel-open {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.65);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: rotate(60deg);
        }

        .settings-icon svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.88);
            pointer-events: none;
            transition: fill var(--transition-speed) ease;
        }

        .settings-icon:hover svg,
        .settings-icon.is-visible svg,
        .settings-icon.is-panel-open svg {
            fill: rgba(255, 255, 255, 0.98);
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 78px;
            right: 22px;
            background: rgba(28, 28, 30, 0.82);
            -webkit-backdrop-filter: blur(28px);
            backdrop-filter: blur(28px);
            border-radius: 16px;
            padding: 22px 20px 18px;
            min-width: 248px;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.94);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            border: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .settings-panel h3 {
            color: rgba(255, 255, 255, 0.88);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.4px;
            text-align: center;
        }

        .settings-panel .wallpaper-info {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
            line-height: 1.4;
            min-height: 16px;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .upload-btn:active {
            transform: scale(0.97);
        }

        .reset-btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.72);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .reset-btn:active {
            transform: scale(0.97);
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 480px) {
            .settings-icon {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }
            .settings-icon svg {
                width: 16px;
                height: 16px;
            }
            .settings-panel {
                top: 66px;
                right: 10px;
                min-width: 220px;
                padding: 18px 16px 14px;
                border-radius: 14px;
            }
            .upload-btn {
                font-size: 12px;
                padding: 10px 14px;
            }
            .reset-btn {
                font-size: 11px;
                padding: 9px 14px;
            }
        }
    </style>
</head>
<body>
    <button class="settings-icon" id="settingsIcon" title="壁纸设置" aria-label="打开壁纸设置面板">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel" role="dialog" aria-label="壁纸设置面板">
        <h3>🖼️ 壁纸设置</h3>
        <p class="wallpaper-info" id="wallpaperInfo"></p>
        <button class="upload-btn" id="uploadBtn">📁 选择本地壁纸</button>
        <input type="file" id="fileInput" accept="image/*">
        <button class="reset-btn" id="resetBtn">🔄 恢复 Bing 每日壁纸</button>
    </div>

    <script>
        (function() {
            // ========== 配置 ==========
            // 直接可用的 Bing 壁纸图片服务（返回图片流，无需CORS）
            const BING_SERVICE_PRIMARY = 'https://bing.img.run/1920x1080.php';
            const BING_SERVICE_FALLBACK = 'https://bing.biturl.cc/1920x1080';

            const CACHE_KEY_URL = 'wallpaper_bing_url';
            const CACHE_KEY_DATE = 'wallpaper_bing_date';
            const CUSTOM_KEY = 'wallpaper_custom';
            const CUSTOM_SOURCE_KEY = 'wallpaper_custom_source';

            // DOM 元素
            const body = document.body;
            const settingsIcon = document.getElementById('settingsIcon');
            const settingsPanel = document.getElementById('settingsPanel');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const resetBtn = document.getElementById('resetBtn');
            const wallpaperInfo = document.getElementById('wallpaperInfo');

            let currentSource = 'bing'; // 'bing' | 'local'
            let isPanelOpen = false;
            let hidePanelTimeout = null;
            let iconVisibleTimeout = null;
            let mouseNearIcon = false;

            // ========== 工具函数 ==========
            function getToday() {
                return new Date().toDateString();
            }

            function setBackground(url) {
                if (url) {
                    body.style.backgroundImage = `url(${url})`;
                } else {
                    body.style.backgroundImage = 'none';
                }
            }

            function updateInfoText() {
                if (!wallpaperInfo) return;
                wallpaperInfo.textContent = currentSource === 'local' 
                    ? '当前：📷 本地壁纸' 
                    : '当前：🌄 Bing 每日壁纸';
            }

            // 测试图片URL是否可访问（纯Img加载，不受CORS限制）
            function testImageUrl(url) {
                return new Promise((resolve) => {
                    const img = new Image();
                    const timeout = setTimeout(() => {
                        img.src = '';
                        resolve(false);
                    }, 8000);
                    img.onload = () => {
                        clearTimeout(timeout);
                        resolve(true);
                    };
                    img.onerror = () => {
                        clearTimeout(timeout);
                        resolve(false);
                    };
                    img.src = url;
                });
            }

            // 获取一个可用的Bing图片URL（带时间戳防缓存）
            async function fetchAvailableBingUrl() {
                const candidates = [BING_SERVICE_PRIMARY, BING_SERVICE_FALLBACK];
                for (const baseUrl of candidates) {
                    const url = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
                    const ok = await testImageUrl(url);
                    if (ok) {
                        return url;
                    }
                    console.warn('图片源不可用:', baseUrl);
                }
                throw new Error('所有 Bing 图片源均无法加载');
            }

            // ========== 壁纸加载核心 ==========
            async function loadWallpaper() {
                // 1. 用户自定义壁纸优先
                const customData = localStorage.getItem(CUSTOM_KEY);
                const customSource = localStorage.getItem(CUSTOM_SOURCE_KEY);
                if (customData && customSource === 'local') {
                    currentSource = 'local';
                    setBackground(customData);
                    updateInfoText();
                    // 后台静默更新Bing缓存（不影响当前）
                    updateBingUrlCacheInBackground().catch(() => {});
                    return;
                }

                // 2. Bing 壁纸模式
                currentSource = 'bing';
                updateInfoText();

                const cachedUrl = localStorage.getItem(CACHE_KEY_URL);
                const cachedDate = localStorage.getItem(CACHE_KEY_DATE);
                const today = getToday();

                // 2a. 今天的缓存URL可用
                if (cachedUrl && cachedDate === today) {
                    setBackground(cachedUrl);
                    return;
                }

                // 2b. 有旧缓存（昨天或更早），先用着，避免空白
                if (cachedUrl) {
                    setBackground(cachedUrl);
                }

                // 2c. 获取最新Bing图片URL并缓存（同时根据情况更新背景）
                try {
                    const newUrl = await fetchAvailableBingUrl();
                    // 更新缓存
                    localStorage.setItem(CACHE_KEY_URL, newUrl);
                    localStorage.setItem(CACHE_KEY_DATE, today);

                    // 如果当前背景为空或还是旧URL，且不是自定义壁纸，则替换为新URL
                    // 因为这时新旧图片几乎一致（每日Bing同一张），切换无感知
                    if (currentSource === 'bing') {
                        setBackground(newUrl);
                    }
                } catch (err) {
                    console.warn('获取最新Bing壁纸失败，保留当前显示:', err.message);
                    // 如果完全没有背景（连旧缓存都没有），回退到主服务（不带时间戳，可能被缓存）
                    if (body.style.backgroundImage === 'none' || !body.style.backgroundImage) {
                        setBackground(BING_SERVICE_PRIMARY);
                        // 同时把当前日期和回退URL存入，防止下次又空白
                        localStorage.setItem(CACHE_KEY_URL, BING_SERVICE_PRIMARY);
                        localStorage.setItem(CACHE_KEY_DATE, today);
                    }
                }
            }

            // 后台更新Bing URL缓存（不改变当前背景，除非背景为空）
            async function updateBingUrlCacheInBackground() {
                const today = getToday();
                if (localStorage.getItem(CACHE_KEY_DATE) === today && localStorage.getItem(CACHE_KEY_URL)) {
                    return; // 今日已缓存
                }
                try {
                    const newUrl = await fetchAvailableBingUrl();
                    localStorage.setItem(CACHE_KEY_URL, newUrl);
                    localStorage.setItem(CACHE_KEY_DATE, today);
                    // 如果当前恰好是Bing模式且背景为空（罕见），帮它显示
                    if (currentSource === 'bing' && (!body.style.backgroundImage || body.style.backgroundImage === 'none')) {
                        setBackground(newUrl);
                    }
                } catch (e) {
                    console.warn('后台更新Bing URL失败:', e.message);
                }
            }

            // ========== 用户操作 ==========
            function setCustomWallpaper(imageDataUrl) {
                setBackground(imageDataUrl);
                localStorage.setItem(CUSTOM_KEY, imageDataUrl);
                localStorage.setItem(CUSTOM_SOURCE_KEY, 'local');
                currentSource = 'local';
                updateInfoText();
                closePanel();
            }

            function resetToBingWallpaper() {
                localStorage.removeItem(CUSTOM_KEY);
                localStorage.removeItem(CUSTOM_SOURCE_KEY);
                // 清除Bing缓存日期，强制明日重新获取
                localStorage.removeItem(CACHE_KEY_DATE);
                localStorage.removeItem(CACHE_KEY_URL);
                currentSource = 'bing';
                updateInfoText();
                closePanel();
                // 重新执行加载，会立即拉取新Bing图片
                loadWallpaper();
            }

            // ========== 面板交互 ==========
            function openPanel() {
                if (isPanelOpen) return;
                isPanelOpen = true;
                settingsPanel.classList.add('active');
                settingsIcon.classList.add('is-panel-open');
                updateInfoText();
                clearTimeout(hidePanelTimeout);
            }

            function closePanel() {
                if (!isPanelOpen) return;
                isPanelOpen = false;
                settingsPanel.classList.remove('active');
                settingsIcon.classList.remove('is-panel-open');
                clearTimeout(hidePanelTimeout);
            }

            function togglePanel() {
                isPanelOpen ? closePanel() : openPanel();
            }

            function showIcon() {
                settingsIcon.classList.add('is-visible');
                clearTimeout(iconVisibleTimeout);
            }

            function hideIcon() {
                if (isPanelOpen) return;
                iconVisibleTimeout = setTimeout(() => {
                    if (!mouseNearIcon && !isPanelOpen) {
                        settingsIcon.classList.remove('is-visible');
                    }
                }, 1500);
            }

            function isNearTopRight(x, y) {
                const threshold = 120;
                return x > window.innerWidth - threshold && y < threshold;
            }

            // ========== 事件绑定 ==========
            settingsIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePanel();
            });

            settingsIcon.addEventListener('mouseenter', () => {
                mouseNearIcon = true;
                showIcon();
                clearTimeout(hidePanelTimeout);
            });

            settingsIcon.addEventListener('mouseleave', () => {
                mouseNearIcon = false;
                if (!isPanelOpen) hideIcon();
                if (isPanelOpen) {
                    hidePanelTimeout = setTimeout(closePanel, 600);
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isNearTopRight(e.clientX, e.clientY)) {
                    showIcon();
                } else if (!mouseNearIcon && !isPanelOpen) {
                    hideIcon();
                }
            });

            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    if (isNearTopRight(t.clientX, t.clientY) && !isPanelOpen) {
                        showIcon();
                        clearTimeout(iconVisibleTimeout);
                        iconVisibleTimeout = setTimeout(() => {
                            if (!mouseNearIcon && !isPanelOpen) settingsIcon.classList.remove('is-visible');
                        }, 3000);
                    }
                }
            }, { passive: true });

            settingsPanel.addEventListener('mouseenter', () => {
                clearTimeout(hidePanelTimeout);
                mouseNearIcon = true;
            });

            settingsPanel.addEventListener('mouseleave', () => {
                mouseNearIcon = false;
                hidePanelTimeout = setTimeout(() => {
                    closePanel();
                    hideIcon();
                }, 500);
            });

            settingsPanel.addEventListener('click', (e) => e.stopPropagation());

            document.addEventListener('click', (e) => {
                if (isPanelOpen && 
                    !settingsPanel.contains(e.target) && 
                    e.target !== settingsIcon && 
                    !settingsIcon.contains(e.target)) {
                    closePanel();
                    hideIcon();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isPanelOpen) {
                    closePanel();
                    hideIcon();
                }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'W') {
                    e.preventDefault();
                    togglePanel();
                }
            });

            uploadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                if (file.size > 20 * 1024 * 1024) {
                    alert('图片文件不能超过20MB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => setCustomWallpaper(e.target.result);
                reader.onerror = () => alert('读取图片失败');
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetToBingWallpaper();
            });

            // ========== 启动 ==========
            function init() {
                const savedSource = localStorage.getItem(CUSTOM_SOURCE_KEY);
                currentSource = (savedSource === 'local' && localStorage.getItem(CUSTOM_KEY)) ? 'local' : 'bing';
                updateInfoText();
                loadWallpaper();
                console.log('✅ 起始页已就绪（稳定直链版）');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
