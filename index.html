<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureTab · 极简起始页</title>
    <meta name="darkreader-lock" content="light">
    <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:;">
    <style>
        :root {
            --bg-fallback: #1a1a2e;
            --icon-opacity-rest: 0.45;
            --icon-opacity-hover: 1;
            --transition-speed: 0.35s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-fallback);
            cursor: default;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
        }

        .wallpaper-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.6s ease;
            z-index: -1;
            background-color: var(--bg-fallback);
        }

        .search-bar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 560px;
            max-width: 90vw;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .search-bar.visible {
            opacity: 1;
            visibility: visible;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 18px;
            padding: 14px 0;
            caret-color: rgba(255, 255, 255, 0.8);
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-engine-icon {
            width: 30px;
            height: 30px;
            cursor: pointer;
            opacity: 0.9;
            transition: opacity 0.2s, transform 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-engine-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .search-engine-icon svg {
            width: 100%;
            height: 100%;
            fill: white;
        }

        .settings-icon {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            opacity: var(--icon-opacity-rest);
            background: rgba(28, 28, 30, 0.35);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity var(--transition-speed) ease, background var(--transition-speed) ease, transform var(--transition-speed) ease, border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        .settings-icon:hover,
        .settings-icon.is-visible {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.6);
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            transform: rotate(30deg);
        }

        .settings-icon:active {
            transform: rotate(30deg) scale(0.92);
            transition: transform 0.12s ease;
        }

        .settings-icon.is-panel-open {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.65);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: rotate(60deg);
        }

        .settings-icon svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.88);
            pointer-events: none;
            transition: fill var(--transition-speed) ease;
        }

        .settings-panel {
            position: fixed;
            top: 78px;
            right: 22px;
            background: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 16px;
            padding: 22px 20px 18px;
            min-width: 270px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.94);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            border: 1px solid rgba(255, 255, 255, 0.12);
            user-select: none;
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .settings-panel h3 {
            color: rgba(255, 255, 255, 0.92);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .settings-panel .wallpaper-info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
            min-height: 18px;
        }

        .upload-btn,
        .reset-btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            border-radius: 10px;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .reset-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 8px;
            font-size: 11px;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.75);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .advanced-toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .advanced-toggle {
            flex: 1;
            display: block;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            border-radius: 10px;
            background: transparent;
            color: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .advanced-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
        }

        .github-icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            text-decoration: none;
        }

        .github-icon-link:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .github-icon-link svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.5);
            transition: fill 0.2s ease;
        }

        .github-icon-link:hover svg {
            fill: rgba(255, 255, 255, 0.9);
        }

        .advanced-section {
            margin-top: 14px;
            display: none;
            flex-direction: column;
            gap: 14px;
            padding: 16px 14px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .advanced-section.show {
            display: flex;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            padding: 4px 0;
        }

        .setting-row label {
            flex: 1;
            margin-right: 10px;
        }

        .setting-row select,
        .setting-row input[type="range"],
        .setting-row input[type="number"] {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
        }

        .setting-row select:hover,
        .setting-row input:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.1);
        }

        .setting-row select option {
            background: #222;
            color: white;
        }

        .setting-row input[type="range"] {
            width: 90px;
            padding: 0;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            border: none;
        }

        .setting-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.4);
        }

        .setting-row input[type="number"] {
            width: 65px;
            text-align: center;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 480px) {
            .settings-icon {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }

            .settings-panel {
                top: 66px;
                right: 10px;
                min-width: 230px;
                padding: 18px 16px 14px;
            }

            .search-bar {
                width: 90vw;
            }
        }
    </style>
</head>

<body>
    <div class="wallpaper-layer" id="wallpaperLayer"></div>
    <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" placeholder="在 Web 中搜索…" autocomplete="off">
        <div class="search-engine-icon" id="searchEngineIcon" title="点击切换搜索引擎 | 回车搜索"></div>
    </div>

    <button class="settings-icon" id="settingsIcon" title="壁纸设置" aria-label="打开设置面板">

        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel">
        <h3>🖼️ 壁纸设置</h3>
        <p class="wallpaper-info" id="wallpaperInfo"></p>
        <button class="upload-btn" id="uploadBtn">📁 选择本地壁纸</button>
        <input type="file" id="fileInput" accept="image/*">
        <button class="reset-btn" id="resetBtn">🔄 恢复 Bing 每日壁纸</button>
        <div class="advanced-toggle-row">
            <button class="advanced-toggle" id="advancedToggle">⚙️ 高级选项</button>
            <a class="github-icon-link" href="https://github.com/HIeart-Vael/PureTab" target="_blank"
                rel="noopener noreferrer" title="GitHub 项目">

                </svg>
            </a>
        </div>
        <div class="advanced-section" id="advancedSection">
            <div class="setting-row">
                <label>搜索栏模式</label>
                <select id="searchModeSelect">
                    <option value="hover">鼠标触发</option>
                    <option value="always">常驻显示</option>
                    <option value="never">始终隐藏</option>
                </select>
            </div>
            <div class="setting-row">
                <label>齿轮不透明度</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="iconOpacityRange" min="0" max="1" step="0.01" value="0.45">
                    <input type="number" id="iconOpacityNumber" min="0" max="1" step="0.01" value="0.45">
                </div>
            </div>
            <div class="setting-row">
                <label>搜索引擎</label>
                <select id="searchEngineSelect">
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                    <option value="baidu">百度</option>
                    <option value="duckduckgo">DuckDuckGo</option>
                </select>
            </div>
            <button class="reset-btn" id="resetAdvancedBtn" style="margin-top:8px;">🔄 恢复高级默认</button>
        </div>
    </div>

            // ---------- IndexedDB 封装 (修复 Safari MIME 丢失) ----------
            function openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            // 保存壁纸时额外存储 MIME 类型 (Safari 兼容)
            async function saveLocalWallpaper(file) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.put(file, CUSTOM_BLOB_KEY);                // 原始 blob/file
                    store.put('local', CUSTOM_SOURCE_KEY);
                    if (file.type) {
                        store.put(file.type, CUSTOM_MIME_KEY);     // 关键: 保留真实类型
                    } else {
                        store.put('image/jpeg', CUSTOM_MIME_KEY);  // fallback
                    }
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }

            async function loadLocalWallpaper() {
                const db = await openDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const blobReq = store.get(CUSTOM_BLOB_KEY);
                    const sourceReq = store.get(CUSTOM_SOURCE_KEY);
                    const mimeReq = store.get(CUSTOM_MIME_KEY);
                    let blob = null, source = null, mime = null;
                    blobReq.onsuccess = () => { blob = blobReq.result; checkDone(); };
                    sourceReq.onsuccess = () => { source = sourceReq.result; checkDone(); };
                    mimeReq.onsuccess = () => { mime = mimeReq.result; checkDone(); };
                    function checkDone() {
                        if (blobReq.readyState === 'done' && sourceReq.readyState === 'done' && mimeReq.readyState === 'done') {
                            if (source === 'local' && blob) {
                                // 🔧 Safari 修复: 如果 blob.type 无效或丢失, 用存储的 MIME 重建 Blob
                                let finalBlob = blob;
                                if ((!blob.type || blob.type === '') && mime && typeof mime === 'string') {
                                    try {
                                        finalBlob = new Blob([blob], { type: mime });
                                    } catch (e) { /* 降级使用原 blob */ }
                                }
                                resolve({ blob: finalBlob, source: 'local' });
                            } else {
                                resolve({ blob: null, source: null });
                            }
                        }
                    }
                });
            }

            async function removeLocalWallpaper() {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.delete(CUSTOM_BLOB_KEY);
                    store.delete(CUSTOM_SOURCE_KEY);
                    store.delete(CUSTOM_MIME_KEY);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }

            // ---------- 壁纸通用方法 ----------
            function setBackground(url) {
                if (currentLocalBlobUrl && url !== currentLocalBlobUrl) {
                    URL.revokeObjectURL(currentLocalBlobUrl);
                    currentLocalBlobUrl = null;
                }
                if (url && url.startsWith('blob:')) currentLocalBlobUrl = url;
                wallpaperLayer.style.backgroundImage = url ? `url(${url})` : 'none';
            }

            function updateInfoText() {
                wallpaperInfo.textContent = currentSource === 'local' ? '当前：📷 本地壁纸' : '当前：🌄 Bing 每日壁纸';
            }

            function testImageUrl(url) {
                return new Promise(resolve => {
                    const img = new Image();
                    const timeout = setTimeout(() => { img.src = ''; resolve(false); }, 8000);
                    img.onload = () => { clearTimeout(timeout); resolve(true); };
                    img.onerror = () => { clearTimeout(timeout); resolve(false); };
                    img.src = url;
                });
            }

            async function fetchAvailableBingUrl() {
                for (const baseUrl of [BING_SERVICE_PRIMARY, BING_SERVICE_FALLBACK]) {
                    const url = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
                    if (await testImageUrl(url)) return url;
                }
                throw new Error('Bing图片源失效');
            }

            async function updateBingUrlCacheInBackground() {
                const today = new Date().toDateString();
                if (localStorage.getItem(CACHE_KEY_DATE) === today && localStorage.getItem(CACHE_KEY_URL)) return;
                try {
                    const newUrl = await fetchAvailableBingUrl();
                    localStorage.setItem(CACHE_KEY_URL, newUrl);
                    localStorage.setItem(CACHE_KEY_DATE, today);
                    if (currentSource === 'bing' && !wallpaperLayer.style.backgroundImage) setBackground(newUrl);
                } catch (e) { }
            }

            async function loadWallpaper() {
                try {
                    const { blob, source } = await loadLocalWallpaper();
                    if (source === 'local' && blob) {
                        currentSource = 'local';
                        const url = URL.createObjectURL(blob);
                        setBackground(url);
                        updateInfoText();
                        updateBingUrlCacheInBackground().catch(() => { });
                        return;
                    }
                } catch (e) { console.warn('读取本地壁纸失败', e); }

                currentSource = 'bing';
                updateInfoText();
                const cachedUrl = localStorage.getItem(CACHE_KEY_URL);
                const cachedDate = localStorage.getItem(CACHE_KEY_DATE);
                const today = new Date().toDateString();
                if (cachedUrl && cachedDate === today) { setBackground(cachedUrl); return; }
                if (cachedUrl) setBackground(cachedUrl);
                try {
                    const newUrl = await fetchAvailableBingUrl();
                    localStorage.setItem(CACHE_KEY_URL, newUrl);
                    localStorage.setItem(CACHE_KEY_DATE, today);
                    if (currentSource === 'bing') setBackground(newUrl);
                } catch (err) {
                    if (!wallpaperLayer.style.backgroundImage) setBackground(BING_SERVICE_PRIMARY);
                }
            }

            async function setCustomWallpaper(file) {
                const blobUrl = URL.createObjectURL(file);
                setBackground(blobUrl);
                try {
                    await saveLocalWallpaper(file);
                    currentSource = 'local';
                    updateInfoText();
                    closePanel();
                } catch (e) {
                    alert('壁纸保存失败: ' + (e.message || '存储错误'));
                    loadWallpaper();
                }
            }

            async function resetToBingWallpaper() {
                await removeLocalWallpaper();
                if (currentLocalBlobUrl) { URL.revokeObjectURL(currentLocalBlobUrl); currentLocalBlobUrl = null; }
                localStorage.removeItem(CACHE_KEY_DATE);
                localStorage.removeItem(CACHE_KEY_URL);
                currentSource = 'bing';
                updateInfoText();
                closePanel();
                loadWallpaper();
            }

            // ---------- UI 交互（保持不变）----------
            function openPanel() { if (isPanelOpen) return; isPanelOpen = true; settingsPanel.classList.add('active'); settingsIcon.classList.add('is-panel-open'); clearTimeout(hidePanelTimeout); }
            function closePanel() { if (!isPanelOpen) return; isPanelOpen = false; settingsPanel.classList.remove('active'); settingsIcon.classList.remove('is-panel-open'); }
            function togglePanel() { isPanelOpen ? closePanel() : openPanel(); }
            function showIcon() { settingsIcon.classList.add('is-visible'); clearTimeout(iconVisibleTimeout); }
            function hideIcon() { if (isPanelOpen) return; iconVisibleTimeout = setTimeout(() => { if (!mouseNearIcon && !isPanelOpen) settingsIcon.classList.remove('is-visible'); }, 300); }
            function isNearTopRight(x, y) { return x > window.innerWidth - 120 && y < 120; }
            function isInCenterArea(x, y) { const w = window.innerWidth, h = window.innerHeight; return x > w * 0.3 && x < w * 0.7 && y > h * 0.45 && y < h * 0.65; }
            function showSearchBar() { if (searchMode === 'never') return; if (searchMode === 'always') searchBar.classList.add('visible'); else { clearTimeout(searchTimeout); searchBar.classList.add('visible'); } }
            function hideSearchBar() { if (searchMode === 'always') return; if (document.activeElement === searchInput) return; clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { if (!mouseOnSearchBar && document.activeElement !== searchInput) searchBar.classList.remove('visible'); }, 100); }
            function applySearchMode(mode) { searchMode = mode; if (mode === 'always') searchBar.classList.add('visible'); else searchBar.classList.remove('visible'); }
            function switchToNextEngine() { currentEngineIndex = (currentEngineIndex + 1) % ENGINE_LIST.length; applySearchEngine(ENGINE_LIST[currentEngineIndex]); searchEngineSelect.value = currentEngine; saveAdvancedSettings(); }
            function applySearchEngine(engine) { currentEngine = engine; currentEngineIndex = ENGINE_LIST.indexOf(engine); searchEngineIcon.innerHTML = ENGINE_ICONS[engine] || ENGINE_ICONS.google; searchEngineSelect.value = engine; }
            function performSearch(query) { if (!query.trim()) return; const engines = { google: 'https://www.google.com/search?q=', bing: 'https://www.bing.com/search?q=', baidu: 'https://www.baidu.com/s?wd=', duckduckgo: 'https://duckduckgo.com/?q=' }; window.open(engines[currentEngine] + encodeURIComponent(query), '_self'); }
            function applyIconOpacity(opacity) { currentIconOpacity = parseFloat(opacity); document.documentElement.style.setProperty('--icon-opacity-rest', currentIconOpacity); iconOpacityRange.value = currentIconOpacity; iconOpacityNumber.value = currentIconOpacity; }
            function loadAdvancedSettings() { const savedMode = localStorage.getItem(SEARCH_MODE_KEY) || 'hover'; const savedOpacity = localStorage.getItem(ICON_OPACITY_KEY) || '0.45'; const savedEngine = localStorage.getItem(SEARCH_ENGINE_KEY) || 'google'; searchModeSelect.value = savedMode; applySearchMode(savedMode); applyIconOpacity(savedOpacity); applySearchEngine(savedEngine); }
            function saveAdvancedSettings() { localStorage.setItem(SEARCH_MODE_KEY, searchModeSelect.value); localStorage.setItem(ICON_OPACITY_KEY, currentIconOpacity); localStorage.setItem(SEARCH_ENGINE_KEY, currentEngine); }

            // 注册事件
            settingsIcon.addEventListener('click', e => { e.stopPropagation(); togglePanel(); });
            settingsIcon.addEventListener('mouseenter', () => { mouseNearIcon = true; showIcon(); clearTimeout(hidePanelTimeout); });
            settingsIcon.addEventListener('mouseleave', () => { mouseNearIcon = false; if (!isPanelOpen) hideIcon(); if (isPanelOpen) hidePanelTimeout = setTimeout(closePanel, 600); });
            document.addEventListener('mousemove', e => { if (isNearTopRight(e.clientX, e.clientY)) showIcon(); else if (!mouseNearIcon && !isPanelOpen) hideIcon(); if (isInCenterArea(e.clientX, e.clientY)) showSearchBar(); else hideSearchBar(); });
            searchBar.addEventListener('mouseenter', () => { mouseOnSearchBar = true; clearTimeout(searchTimeout); });
            searchBar.addEventListener('mouseleave', () => { mouseOnSearchBar = false; if (searchMode === 'hover' && document.activeElement !== searchInput) searchTimeout = setTimeout(() => { if (!mouseOnSearchBar && document.activeElement !== searchInput) searchBar.classList.remove('visible'); }, 300); });
            searchInput.addEventListener('focus', () => { searchBar.classList.add('visible'); clearTimeout(searchTimeout); });
            searchInput.addEventListener('blur', () => { setTimeout(() => { if (!mouseOnSearchBar && searchMode === 'hover' && document.activeElement !== searchInput) searchBar.classList.remove('visible'); }, 100); });
            document.addEventListener('touchstart', e => { if (e.touches.length === 1) { const t = e.touches[0]; if (isNearTopRight(t.clientX, t.clientY) && !isPanelOpen) { showIcon(); clearTimeout(iconVisibleTimeout); iconVisibleTimeout = setTimeout(() => { if (!mouseNearIcon && !isPanelOpen) settingsIcon.classList.remove('is-visible'); }, 3000); } } }, { passive: true });
            settingsPanel.addEventListener('mouseenter', () => { clearTimeout(hidePanelTimeout); mouseNearIcon = true; });
            settingsPanel.addEventListener('mouseleave', () => { mouseNearIcon = false; hidePanelTimeout = setTimeout(() => { closePanel(); hideIcon(); }, 500); });
            settingsPanel.addEventListener('click', e => e.stopPropagation());
            document.addEventListener('click', e => { if (isPanelOpen && !settingsPanel.contains(e.target) && e.target !== settingsIcon && !settingsIcon.contains(e.target)) { closePanel(); hideIcon(); } });
            document.addEventListener('keydown', e => { if (e.key === 'Escape' && isPanelOpen) { closePanel(); hideIcon(); } if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'W') { e.preventDefault(); togglePanel(); } if (e.key === 'Enter' && document.activeElement === searchInput) performSearch(searchInput.value); });
            uploadBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
            fileInput.addEventListener('change', event => { const file = event.target.files[0]; if (!file) return; if (!file.type.startsWith('image/')) { alert('请选择图片文件'); fileInput.value = ''; return; } setCustomWallpaper(file); fileInput.value = ''; });
            resetBtn.addEventListener('click', e => { e.stopPropagation(); resetToBingWallpaper(); });
            advancedToggle.addEventListener('click', e => { e.stopPropagation(); advancedSection.classList.toggle('show'); });
            searchModeSelect.addEventListener('change', () => { applySearchMode(searchModeSelect.value); saveAdvancedSettings(); });
            iconOpacityRange.addEventListener('input', () => { applyIconOpacity(iconOpacityRange.value); saveAdvancedSettings(); });
            iconOpacityNumber.addEventListener('change', () => { let val = parseFloat(iconOpacityNumber.value); if (isNaN(val)) val = 0.45; val = Math.min(1, Math.max(0, val)); applyIconOpacity(val); saveAdvancedSettings(); });
            document.getElementById('resetAdvancedBtn').addEventListener('click', () => { applySearchMode('hover'); searchModeSelect.value = 'hover'; applySearchEngine('google'); applyIconOpacity(0.4); saveAdvancedSettings(); });
            searchEngineSelect.addEventListener('change', () => { applySearchEngine(searchEngineSelect.value); saveAdvancedSettings(); });
            searchEngineIcon.addEventListener('click', (e) => { e.stopPropagation(); switchToNextEngine(); });

            // 启动
            function init() { loadWallpaper(); loadAdvancedSettings(); }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
        })();
    </script>
