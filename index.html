<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>起始页</title>
    <!-- 显式放宽图片安全策略，避免部分浏览器过度拦截 -->
    <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:;">
    <style>
        :root {
            --bg-fallback: #1a1a2e;
            --icon-opacity-rest: 0.28;
            --icon-opacity-hover: 1;
            --transition-speed: 0.35s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-fallback);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.6s ease;
            cursor: default;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            /* 初始由JS动态设置，避免闪烁 */
            background-image: none;
        }

        /* 设置图标 */
        .settings-icon {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            opacity: var(--icon-opacity-rest);
            visibility: visible;
            background: rgba(28, 28, 30, 0.35);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity var(--transition-speed) ease,
                        background var(--transition-speed) ease,
                        transform var(--transition-speed) ease,
                        border-color var(--transition-speed) ease,
                        box-shadow var(--transition-speed) ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        .settings-icon:hover,
        .settings-icon.is-visible {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.6);
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            transform: rotate(30deg);
        }

        .settings-icon:active {
            transform: rotate(30deg) scale(0.92);
            transition: transform 0.12s ease;
        }

        .settings-icon.is-panel-open {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.65);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: rotate(60deg);
        }

        .settings-icon svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.88);
            pointer-events: none;
            transition: fill var(--transition-speed) ease;
        }

        .settings-icon:hover svg,
        .settings-icon.is-visible svg,
        .settings-icon.is-panel-open svg {
            fill: rgba(255, 255, 255, 0.98);
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 78px;
            right: 22px;
            background: rgba(28, 28, 30, 0.82);
            -webkit-backdrop-filter: blur(28px);
            backdrop-filter: blur(28px);
            border-radius: 16px;
            padding: 22px 20px 18px;
            min-width: 248px;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.94);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            border: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .settings-panel h3 {
            color: rgba(255, 255, 255, 0.88);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.4px;
            text-align: center;
        }

        .settings-panel .wallpaper-info {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
            line-height: 1.4;
            min-height: 16px;
            transition: color 0.3s ease;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .upload-btn:active {
            transform: scale(0.97);
        }

        .reset-btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.72);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .reset-btn:active {
            transform: scale(0.97);
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 480px) {
            .settings-icon {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }
            .settings-icon svg {
                width: 16px;
                height: 16px;
            }
            .settings-panel {
                top: 66px;
                right: 10px;
                min-width: 220px;
                padding: 18px 16px 14px;
                border-radius: 14px;
            }
            .upload-btn {
                font-size: 12px;
                padding: 10px 14px;
            }
            .reset-btn {
                font-size: 11px;
                padding: 9px 14px;
            }
        }
    </style>
</head>
<body>
    <button class="settings-icon" id="settingsIcon" title="壁纸设置" aria-label="打开壁纸设置面板">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel" role="dialog" aria-label="壁纸设置面板">
        <h3>🖼️ 壁纸设置</h3>
        <p class="wallpaper-info" id="wallpaperInfo"></p>
        <button class="upload-btn" id="uploadBtn">📁 选择本地壁纸</button>
        <input type="file" id="fileInput" accept="image/*">
        <button class="reset-btn" id="resetBtn">🔄 恢复 Bing 每日壁纸</button>
    </div>

    <script>
        (function() {
            // === 配置 ===
            // 直接返回图片的 Bing 壁纸服务（更稳定，不依赖JSON解析）
            const BING_IMAGE_SERVICE = 'https://bing.img.run/1920x1080.php';
            const BING_IMAGE_SERVICE_BACKUP = 'https://bing.biturl.cc/1920x1080';

            const CACHE_KEY = 'wallpaper_bing_base64';
            const CACHE_DATE_KEY = 'wallpaper_bing_date';
            const CUSTOM_KEY = 'wallpaper_custom';
            const CUSTOM_SOURCE_KEY = 'wallpaper_custom_source';

            // DOM
            const body = document.body;
            const settingsIcon = document.getElementById('settingsIcon');
            const settingsPanel = document.getElementById('settingsPanel');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const resetBtn = document.getElementById('resetBtn');
            const wallpaperInfo = document.getElementById('wallpaperInfo');

            let isPanelOpen = false;
            let hidePanelTimeout = null;
            let currentSource = 'bing'; // 'bing' | 'local'
            let iconVisibleTimeout = null;
            let mouseNearIcon = false;

            // === 工具函数 ===
            function getToday() {
                return new Date().toDateString();
            }

            function setBackground(url) {
                body.style.backgroundImage = url ? `url(${url})` : 'none';
            }

            function updateInfoText() {
                if (!wallpaperInfo) return;
                wallpaperInfo.textContent = currentSource === 'local' ? '当前：📷 本地壁纸' : '当前：🌄 Bing 每日壁纸';
            }

            // === 将网络图片转为 Base64 并缓存（关键：解决跨域加载失败与切换闪烁） ===
            function convertToBase64(url) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous'; // 尝试CORS
                    img.onload = function() {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            const base64 = canvas.toDataURL('image/jpeg', 0.9);
                            resolve(base64);
                        } catch (e) {
                            // canvas被污染（CORS未正确配置），无法转base64
                            reject(new Error('Canvas tainted - CORS missing'));
                        }
                    };
                    img.onerror = () => reject(new Error('Image load failed'));
                    // 6秒超时
                    setTimeout(() => reject(new Error('Timeout')), 6000);
                    img.src = url;
                });
            }

            // 获取一个可用的 Bing 图片 URL（优先用服务1，失败用服务2）
            async function fetchAvailableBingUrl() {
                const candidates = [BING_IMAGE_SERVICE, BING_IMAGE_SERVICE_BACKUP];
                for (const url of candidates) {
                    try {
                        const testUrl = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
                        // 简单验证是否可达（通过Image预加载）
                        await new Promise((resolve, reject) => {
                            const img = new Image();
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = testUrl;
                            setTimeout(() => reject(new Error('Timeout')), 5000);
                        });
                        return testUrl;
                    } catch (e) {
                        console.warn('图片源不可用:', url, e.message);
                    }
                }
                throw new Error('所有 Bing 图片源均无法访问');
            }

            // === 壁纸加载核心：只设置背景，不更改显示（除非首次无图） ===
            async function loadWallpaper() {
                // 1. 用户自定义壁纸优先
                const customData = localStorage.getItem(CUSTOM_KEY);
                const customSource = localStorage.getItem(CUSTOM_SOURCE_KEY);
                if (customData && customSource === 'local') {
                    currentSource = 'local';
                    setBackground(customData);
                    updateInfoText();
                    // 后台仍然更新Bing缓存（不影响当前）
                    updateBingCacheInBackground().catch(() => {});
                    return;
                }

                // 2. 使用 Bing 壁纸
                currentSource = 'bing';
                updateInfoText();

                const cachedBase64 = localStorage.getItem(CACHE_KEY);
                const cachedDate = localStorage.getItem(CACHE_DATE_KEY);
                const today = getToday();

                // 2a. 今天的 base64 缓存可用（直接使用，完全不依赖外部URL）
                if (cachedBase64 && cachedDate === today) {
                    setBackground(cachedBase64);
                    return;
                }

                // 2b. 有旧缓存（昨天的），先顶上，避免空白
                if (cachedBase64) {
                    setBackground(cachedBase64);
                }

                // 2c. 后台获取最新Bing图片转base64后缓存，不影响当前显示
                updateBingCacheInBackground().catch(err => {
                    console.warn('后台更新Bing缓存失败:', err.message);
                    // 如果连旧缓存都没有，且当前没有背景，尝试用直接URL救命
                    if (!cachedBase64 && body.style.backgroundImage === 'none') {
                        // 最后尝试直接设置服务URL（可能还是被拦截，但聊胜于无）
                        setBackground(BING_IMAGE_SERVICE + '?t=' + Date.now());
                    }
                });
            }

            // 后台任务：下载最新的Bing图片，转base64，更新缓存（不修改当前背景）
            async function updateBingCacheInBackground() {
                const today = getToday();
                // 如果今天已经缓存了base64，就不再浪费流量
                if (localStorage.getItem(CACHE_DATE_KEY) === today && localStorage.getItem(CACHE_KEY)) {
                    return;
                }

                let imageUrl;
                try {
                    imageUrl = await fetchAvailableBingUrl();
                } catch (e) {
                    console.warn('没有可用的Bing图片源，跳过缓存更新');
                    return;
                }

                try {
                    const base64 = await convertToBase64(imageUrl);
                    // 存入缓存
                    localStorage.setItem(CACHE_KEY, base64);
                    localStorage.setItem(CACHE_DATE_KEY, today);
                    // 如果当前没有背景，或者背景还是旧缓存，可以悄悄替换为最新（无感知）
                    // 但为了100%避免闪烁，我们保持只在“下次启动”生效。
                    // 若希望立即看到效果，可以让用户手动刷新；也可以在这里做一个淡入切换，但为了避免您遇到的拦截问题，保持稳定优先。
                } catch (e) {
                    console.warn('转换base64失败（可能CORS不支持），尝试缓存URL作为备用');
                    // 降级策略：缓存该URL，下次启动时可能能用（但可能被拦截，不过有了base64机制，通常不会被用来直接显示）
                    // 这里不主动设置背景，所以即使失败也无影响。
                }
            }

            // === 用户操作 ===
            function setCustomWallpaper(imageDataUrl) {
                setBackground(imageDataUrl);
                localStorage.setItem(CUSTOM_KEY, imageDataUrl);
                localStorage.setItem(CUSTOM_SOURCE_KEY, 'local');
                currentSource = 'local';
                updateInfoText();
                closePanel();
            }

            function resetToBingWallpaper() {
                localStorage.removeItem(CUSTOM_KEY);
                localStorage.removeItem(CUSTOM_SOURCE_KEY);
                // 清除Bing缓存日期，强制重新获取
                localStorage.removeItem(CACHE_DATE_KEY);
                localStorage.removeItem(CACHE_KEY);
                currentSource = 'bing';
                updateInfoText();
                closePanel();
                // 重新启动加载流程
                loadWallpaper();
            }

            // === 面板交互 ===
            function openPanel() {
                if (isPanelOpen) return;
                isPanelOpen = true;
                settingsPanel.classList.add('active');
                settingsIcon.classList.add('is-panel-open');
                updateInfoText();
                clearTimeout(hidePanelTimeout);
            }

            function closePanel() {
                if (!isPanelOpen) return;
                isPanelOpen = false;
                settingsPanel.classList.remove('active');
                settingsIcon.classList.remove('is-panel-open');
                clearTimeout(hidePanelTimeout);
            }

            function togglePanel() {
                isPanelOpen ? closePanel() : openPanel();
            }

            // 图标可见性控制
            function showIcon() {
                settingsIcon.classList.add('is-visible');
                clearTimeout(iconVisibleTimeout);
            }

            function hideIcon() {
                if (isPanelOpen) return;
                iconVisibleTimeout = setTimeout(() => {
                    if (!mouseNearIcon && !isPanelOpen) {
                        settingsIcon.classList.remove('is-visible');
                    }
                }, 1500);
            }

            function isNearTopRight(x, y) {
                const threshold = 120;
                return x > window.innerWidth - threshold && y < threshold;
            }

            // 事件绑定
            settingsIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePanel();
            });

            settingsIcon.addEventListener('mouseenter', () => {
                mouseNearIcon = true;
                showIcon();
                clearTimeout(hidePanelTimeout);
            });

            settingsIcon.addEventListener('mouseleave', () => {
                mouseNearIcon = false;
                if (!isPanelOpen) hideIcon();
                if (isPanelOpen) {
                    hidePanelTimeout = setTimeout(closePanel, 600);
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isNearTopRight(e.clientX, e.clientY)) {
                    showIcon();
                } else if (!mouseNearIcon && !isPanelOpen) {
                    hideIcon();
                }
            });

            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    if (isNearTopRight(t.clientX, t.clientY) && !isPanelOpen) {
                        showIcon();
                        iconVisibleTimeout = setTimeout(() => {
                            if (!mouseNearIcon && !isPanelOpen) settingsIcon.classList.remove('is-visible');
                        }, 3000);
                    }
                }
            }, { passive: true });

            settingsPanel.addEventListener('mouseenter', () => {
                clearTimeout(hidePanelTimeout);
                mouseNearIcon = true;
            });

            settingsPanel.addEventListener('mouseleave', () => {
                mouseNearIcon = false;
                hidePanelTimeout = setTimeout(() => {
                    closePanel();
                    hideIcon();
                }, 500);
            });

            settingsPanel.addEventListener('click', (e) => e.stopPropagation());

            document.addEventListener('click', (e) => {
                if (isPanelOpen && !settingsPanel.contains(e.target) && e.target !== settingsIcon && !settingsIcon.contains(e.target)) {
                    closePanel();
                    hideIcon();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isPanelOpen) {
                    closePanel();
                    hideIcon();
                }
                // 快捷键 Ctrl+Shift+W
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'W') {
                    e.preventDefault();
                    togglePanel();
                }
            });

            uploadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                if (file.size > 20 * 1024 * 1024) {
                    alert('图片文件不能超过20MB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => setCustomWallpaper(e.target.result);
                reader.onerror = () => alert('读取图片失败');
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetToBingWallpaper();
            });

            // 启动
            function init() {
                const savedSource = localStorage.getItem(CUSTOM_SOURCE_KEY);
                currentSource = (savedSource === 'local' && localStorage.getItem(CUSTOM_KEY)) ? 'local' : 'bing';
                updateInfoText();
                loadWallpaper();
                console.log('✅ 起始页已就绪（稳定版）');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
