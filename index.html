<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>起始页</title>
    <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:;">
    <style>
        :root {
            --bg-fallback: #1a1a2e;
            --icon-opacity-rest: 0.28;
            --icon-opacity-hover: 1;
            --transition-speed: 0.35s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-fallback);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.6s ease;
            cursor: default;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-image: none;
        }

        .settings-icon {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            opacity: var(--icon-opacity-rest);
            background: rgba(28, 28, 30, 0.35);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity var(--transition-speed) ease, background var(--transition-speed) ease, transform var(--transition-speed) ease, border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        .settings-icon:hover,
        .settings-icon.is-visible {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.6);
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            transform: rotate(30deg);
        }

        .settings-icon:active {
            transform: rotate(30deg) scale(0.92);
            transition: transform 0.12s ease;
        }

        .settings-icon.is-panel-open {
            opacity: var(--icon-opacity-hover);
            background: rgba(28, 28, 30, 0.65);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transform: rotate(60deg);
        }

        .settings-icon svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.88);
            pointer-events: none;
            transition: fill var(--transition-speed) ease;
        }

        .settings-icon:hover svg,
        .settings-icon.is-visible svg,
        .settings-icon.is-panel-open svg {
            fill: rgba(255, 255, 255, 0.98);
        }

        .settings-panel {
            position: fixed;
            top: 78px;
            right: 22px;
            background: rgba(28, 28, 30, 0.82);
            backdrop-filter: blur(28px);
            border-radius: 16px;
            padding: 22px 20px 18px;
            min-width: 248px;
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.94);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            border: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }

        .settings-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .settings-panel h3 {
            color: rgba(255, 255, 255, 0.88);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.4px;
            text-align: center;
        }

        .settings-panel .wallpaper-info {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .upload-btn:active {
            transform: scale(0.97);
        }

        .reset-btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.72);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .reset-btn:active {
            transform: scale(0.97);
        }

        input[type="file"] {
            display: none;
        }

        @media (max-width: 480px) {
            .settings-icon {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }
            .settings-panel {
                top: 66px;
                right: 10px;
                min-width: 220px;
                padding: 18px 16px 14px;
                border-radius: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="settings-icon" id="settingsIcon" title="壁纸设置" aria-label="打开壁纸设置面板">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel" role="dialog" aria-label="壁纸设置面板">
        <h3>🖼️ 壁纸设置</h3>
        <p class="wallpaper-info" id="wallpaperInfo"></p>
        <button class="upload-btn" id="uploadBtn">📁 选择本地壁纸</button>
        <input type="file" id="fileInput" accept="image/*">
        <button class="reset-btn" id="resetBtn">🔄 恢复 Bing 每日壁纸</button>
    </div>

    <script>
        (function() {
            // ========== 使用 Bing 官方 JSON API 获取图片 ==========
            const BING_API = 'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN';
            const BING_BASE = 'https://www.bing.com';

            const CACHE_KEY_URL = 'wallpaper_bing_url';
            const CACHE_KEY_DATE = 'wallpaper_bing_date';
            const CUSTOM_KEY = 'wallpaper_custom';
            const CUSTOM_SOURCE_KEY = 'wallpaper_custom_source';

            const body = document.body;
            const settingsIcon = document.getElementById('settingsIcon');
            const settingsPanel = document.getElementById('settingsPanel');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');
            const resetBtn = document.getElementById('resetBtn');
            const wallpaperInfo = document.getElementById('wallpaperInfo');

            let currentSource = 'bing';
            let isPanelOpen = false;
            let hidePanelTimeout, iconVisibleTimeout;
            let mouseNearIcon = false;

            // 工具函数
            const getToday = () => new Date().toDateString();
            const setBackground = (url) => {
                body.style.backgroundImage = url ? `url(${url})` : 'none';
            };
            const updateInfoText = () => {
                if (wallpaperInfo) {
                    wallpaperInfo.textContent = currentSource === 'local' ? '当前：📷 本地壁纸' : '当前：🌄 Bing 每日壁纸';
                }
            };

            // 从 Bing JSON API 获取今日图片完整 URL
            async function fetchBingOfficialUrl() {
                const response = await fetch(BING_API);
                if (!response.ok) throw new Error('Bing API 返回错误');
                const data = await response.json();
                if (!data?.images?.length) throw new Error('无图片数据');
                let imagePath = data.images[0].url;
                if (!imagePath.startsWith('http')) {
                    imagePath = BING_BASE + imagePath;
                }
                return imagePath;
            }

            // 预加载图片，成功返回 true，失败返回 false
            function preloadImage(url, timeout = 8000) {
                return new Promise((resolve) => {
                    const img = new Image();
                    const timer = setTimeout(() => {
                        img.src = '';
                        resolve(false);
                    }, timeout);
                    img.onload = () => {
                        clearTimeout(timer);
                        resolve(true);
                    };
                    img.onerror = () => {
                        clearTimeout(timer);
                        resolve(false);
                    };
                    img.src = url;
                });
            }

            // 核心加载流程
            async function loadWallpaper() {
                // 自定义壁纸优先
                const customData = localStorage.getItem(CUSTOM_KEY);
                if (customData && localStorage.getItem(CUSTOM_SOURCE_KEY) === 'local') {
                    currentSource = 'local';
                    setBackground(customData);
                    updateInfoText();
                    updateBingCacheInBackground().catch(() => {});
                    return;
                }

                currentSource = 'bing';
                updateInfoText();

                const cachedUrl = localStorage.getItem(CACHE_KEY_URL);
                const cachedDate = localStorage.getItem(CACHE_KEY_DATE);
                const today = getToday();

                // 如果有今日缓存且已预加载成功（此处简单信任缓存）
                if (cachedUrl && cachedDate === today) {
                    setBackground(cachedUrl);
                    // 后台静默刷新（可能次日使用）
                    updateBingCacheInBackground().catch(() => {});
                    return;
                }

                // 有旧缓存，先显示
                if (cachedUrl) {
                    setBackground(cachedUrl);
                }

                // 获取今日新图，预加载成功后才替换背景，避免闪烁
                try {
                    const newUrl = await fetchBingOfficialUrl();
                    const loaded = await preloadImage(newUrl);
                    if (loaded) {
                        localStorage.setItem(CACHE_KEY_URL, newUrl);
                        localStorage.setItem(CACHE_KEY_DATE, today);
                        // 只有当前仍是bing模式且新图加载成功才替换
                        if (currentSource === 'bing') {
                            setBackground(newUrl);
                        }
                    } else {
                        console.warn('新Bing图片预加载失败，保持当前背景');
                        // 如果连旧缓存都没有，尝试使用之前缓存的URL（可能过期但至少不是空白）
                        if (!cachedUrl && body.style.backgroundImage === 'none') {
                            setBackground(cachedUrl || ''); 
                        }
                    }
                } catch (err) {
                    console.warn('获取Bing图片URL失败:', err.message);
                    // 没有背景时尝试用旧缓存挽救
                    if (body.style.backgroundImage === 'none' && cachedUrl) {
                        setBackground(cachedUrl);
                    }
                }
            }

            // 后台更新缓存（不影响当前显示）
            async function updateBingCacheInBackground() {
                const today = getToday();
                if (localStorage.getItem(CACHE_KEY_DATE) === today && localStorage.getItem(CACHE_KEY_URL)) return;
                try {
                    const newUrl = await fetchBingOfficialUrl();
                    const loaded = await preloadImage(newUrl);
                    if (loaded) {
                        localStorage.setItem(CACHE_KEY_URL, newUrl);
                        localStorage.setItem(CACHE_KEY_DATE, today);
                        // 如果当前因为某些原因背景为空（比如刚重置），可以偷偷显示
                        if (currentSource === 'bing' && (!body.style.backgroundImage || body.style.backgroundImage === 'none')) {
                            setBackground(newUrl);
                        }
                    }
                } catch (e) {
                    console.warn('后台更新Bing缓存失败:', e.message);
                }
            }

            // 用户设置本地壁纸
            function setCustomWallpaper(imageDataUrl) {
                setBackground(imageDataUrl);
                localStorage.setItem(CUSTOM_KEY, imageDataUrl);
                localStorage.setItem(CUSTOM_SOURCE_KEY, 'local');
                currentSource = 'local';
                updateInfoText();
                closePanel();
            }

            // 重置为Bing壁纸
            function resetToBingWallpaper() {
                localStorage.removeItem(CUSTOM_KEY);
                localStorage.removeItem(CUSTOM_SOURCE_KEY);
                localStorage.removeItem(CACHE_KEY_DATE);
                localStorage.removeItem(CACHE_KEY_URL);
                currentSource = 'bing';
                updateInfoText();
                closePanel();
                loadWallpaper();
            }

            // 面板交互逻辑...
            function openPanel() {
                if (isPanelOpen) return;
                isPanelOpen = true;
                settingsPanel.classList.add('active');
                settingsIcon.classList.add('is-panel-open');
                updateInfoText();
                clearTimeout(hidePanelTimeout);
            }

            function closePanel() {
                if (!isPanelOpen) return;
                isPanelOpen = false;
                settingsPanel.classList.remove('active');
                settingsIcon.classList.remove('is-panel-open');
                clearTimeout(hidePanelTimeout);
            }

            function togglePanel() {
                isPanelOpen ? closePanel() : openPanel();
            }

            function showIcon() {
                settingsIcon.classList.add('is-visible');
                clearTimeout(iconVisibleTimeout);
            }

            function hideIcon() {
                if (isPanelOpen) return;
                iconVisibleTimeout = setTimeout(() => {
                    if (!mouseNearIcon && !isPanelOpen) {
                        settingsIcon.classList.remove('is-visible');
                    }
                }, 1500);
            }

            function isNearTopRight(x, y) {
                const threshold = 120;
                return x > window.innerWidth - threshold && y < threshold;
            }

            // 事件绑定
            settingsIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePanel();
            });

            settingsIcon.addEventListener('mouseenter', () => {
                mouseNearIcon = true;
                showIcon();
                clearTimeout(hidePanelTimeout);
            });

            settingsIcon.addEventListener('mouseleave', () => {
                mouseNearIcon = false;
                if (!isPanelOpen) hideIcon();
                if (isPanelOpen) {
                    hidePanelTimeout = setTimeout(closePanel, 600);
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isNearTopRight(e.clientX, e.clientY)) {
                    showIcon();
                } else if (!mouseNearIcon && !isPanelOpen) {
                    hideIcon();
                }
            });

            document.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    if (isNearTopRight(t.clientX, t.clientY) && !isPanelOpen) {
                        showIcon();
                        clearTimeout(iconVisibleTimeout);
                        iconVisibleTimeout = setTimeout(() => {
                            if (!mouseNearIcon && !isPanelOpen) settingsIcon.classList.remove('is-visible');
                        }, 3000);
                    }
                }
            }, { passive: true });

            settingsPanel.addEventListener('mouseenter', () => {
                clearTimeout(hidePanelTimeout);
                mouseNearIcon = true;
            });

            settingsPanel.addEventListener('mouseleave', () => {
                mouseNearIcon = false;
                hidePanelTimeout = setTimeout(() => {
                    closePanel();
                    hideIcon();
                }, 500);
            });

            settingsPanel.addEventListener('click', (e) => e.stopPropagation());

            document.addEventListener('click', (e) => {
                if (isPanelOpen && !settingsPanel.contains(e.target) && e.target !== settingsIcon && !settingsIcon.contains(e.target)) {
                    closePanel();
                    hideIcon();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isPanelOpen) {
                    closePanel();
                    hideIcon();
                }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'W') {
                    e.preventDefault();
                    togglePanel();
                }
            });

            uploadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件');
                    return;
                }
                if (file.size > 20 * 1024 * 1024) {
                    alert('图片文件不能超过20MB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => setCustomWallpaper(e.target.result);
                reader.onerror = () => alert('读取图片失败');
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetToBingWallpaper();
            });

            // 初始化
            function init() {
                const savedSource = localStorage.getItem(CUSTOM_SOURCE_KEY);
                currentSource = (savedSource === 'local' && localStorage.getItem(CUSTOM_KEY)) ? 'local' : 'bing';
                updateInfoText();
                loadWallpaper();
                console.log('✅ 起始页已就绪（官方Bing源 + 预加载防闪）');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
