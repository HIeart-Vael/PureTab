<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>PlainTab</title>
    <meta name="darkreader-lock" content="light">
    <link rel="icon" type="image/png" sizes="16x16" href="icon/icon16.png">
    <link rel="preload" href="js/preload.js" as="script">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/wallpaper.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/palette.css">
</head>

<body>
    <div class="wallpaper-layer" id="wallpaperBack"></div>
    <script src="js/preload.js"></script>

    <div class="wallpaper-layer wallpaper-layer-front" id="wallpaperFront"></div>

    <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" placeholder="Search the Web…" autocomplete="off">
        <div class="search-engine-icon" id="searchEngineIcon" title="Switch engine | Enter to search"></div>
    </div>

    <button class="corner-btn lang-btn" id="langBtn" title="Switch Language" aria-label="Switch Language">
        <svg viewBox="0 0 24 24">
            <path
                d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z" />
        </svg>
    </button>

    <button class="corner-btn settings-btn" id="settingsBtn" title="Wallpaper Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24">
            <path
                d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
        </svg>
    </button>

    <div class="settings-panel" id="settingsPanel">
        <div class="wp-mode-row">
            <span class="wp-mode-chip bing" id="wpModeChip">Bing daily wallpaper</span>
        </div>
        <span id="galleryAnchor" hidden></span>
        <button class="panel-btn primary gallery-add-btn" id="uploadBtn" title="Add wallpaper" aria-label="Add wallpaper">+</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="l1-bottom">
            <button class="l1-adv-btn" id="advSettingsBtn" data-i18n="advToggle">高级设置</button>
            <a class="l1-gh-btn" href="https://github.com/kaininx/PlainTab" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub">
                <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                <span>GitHub</span>
            </a>
        </div>
        <div class="l1-version">PlainTab v3.2.0</div>
    </div>

    <div class="language-panel" id="langPanel">
        <div class="lang-title" data-i18n="langPanelTitle">Language</div>
        <div id="langOptions"></div>
    </div>

    <!-- L2 模态设置窗口 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-window" id="modalWindow">
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="appearance" data-i18n="tabAppearance">界面</button>
                <button class="modal-tab" data-tab="wallpaper" data-i18n="tabWallpaper">壁纸</button>
                <button class="modal-tab" data-tab="shortcuts" data-i18n="tabShortcuts">快捷键</button>
                <button class="modal-tab" data-tab="about" data-i18n="tabAbout">关于</button>
            </div>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <!-- 命令面板 -->
    <div class="cmd-palette-overlay" id="cmdOverlay">
        <div class="cmd-palette" id="cmdPalette">
            <div class="cp-pinned-bar" id="cpPinnedBar"></div>
            <input class="cp-search-input" id="cpSearchInput" placeholder="" autocomplete="off" spellcheck="false">
            <div class="cp-content" id="cpContent"></div>
        </div>
    </div>

    <script src="js/languages.js"></script>
    <script src="js/wallpaper/data.js"></script>
    <script src="js/wallpaper/show.js"></script>
    <script src="js/wallpaper/fetch.js"></script>
    <script src="js/wallpaper/theme.js"></script>
    <script src="js/palette.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/newtab.js"></script>
</body>

</html>
